<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEC_RESTAURANT_SPATIAL_VIBE_TRANSITION - Prototype</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style type="text/tailwindcss">
    @layer utilities {
      .text-clamp-display {
        font-size: clamp(3rem, 8vw + 1rem, 8rem);
      }
    }

    /* CSS Noise/Grain Overlay (Performant) */
    .bg-noise {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 50;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* Initiale Maske für Desktop */
    @media (min-width: 1024px) {
      .mask-layer {
        clip-path: inset(25% 35% 25% 35% round 24px);
        will-change: clip-path;
      }
    }
    /* Mobile Fallback: Keine Maske, normales Stacking */
    @media (max-width: 1023px) {
      .mask-layer {
        clip-path: inset(0% 0% 0% 0% round 0px);
      }
    }
  </style>
</head>
<body class="antialiased font-sans transition-colors duration-700 ease-in-out" id="vibe-body" style="background-color: #f5f5f4;">

  <div class="h-screen flex items-center justify-center border-b border-stone-300/30 text-stone-500 uppercase tracking-widest transition-colors duration-700">
    Scroll down to experience the transition
  </div>

  <div class="vibe-transition-wrapper relative w-full lg:h-screen">
    
    <section class="vibe-state-1 relative w-full h-[70vh] lg:h-screen flex items-center justify-center overflow-hidden">
      <img 
        src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?q=80&w=2000&auto=format&fit=crop" 
        alt="Bright Cafe Interior"
        class="absolute inset-0 w-full h-full object-cover opacity-60"
      >
      <div class="state-1-text relative z-10 text-center text-stone-900 px-4">
        <span class="text-sm tracking-[0.3em] uppercase font-semibold mb-4 block">14:00 — The Lounge</span>
        <h2 class="text-clamp-display font-light leading-none tracking-tight">Afternoon<br>Light.</h2>
      </div>
    </section>

    <section 
      class="mask-layer vibe-state-2 relative lg:absolute lg:inset-0 w-full h-[70vh] lg:h-screen flex items-center justify-center overflow-hidden bg-stone-950 mt-4 lg:mt-0"
      data-mobile-bg="#0c0a09" 
    >
      <img 
        src="https://images.unsplash.com/photo-1514933651103-005eec06c04b?q=80&w=2000&auto=format&fit=crop" 
        alt="Dark Bar Interior"
        class="absolute inset-0 w-full h-full object-cover opacity-40 mix-blend-overlay"
      >
      <div class="bg-noise"></div>
      
      <div class="state-2-text relative z-10 text-center text-stone-50 px-4">
        <span class="text-sm tracking-[0.3em] uppercase text-stone-400 mb-4 block">21:00 — Main Bar</span>
        <h2 class="text-clamp-display font-light leading-none tracking-tight">Midnight<br>Rhythm.</h2>
      </div>
    </section>

  </div>
  <div class="h-screen flex items-center justify-center text-stone-500 uppercase tracking-widest border-t border-stone-800/30 transition-colors duration-700">
    End of transition
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      gsap.registerPlugin(ScrollTrigger);

      const wrapper = document.querySelector('.vibe-transition-wrapper');
      if (!wrapper) return;

      const body = document.getElementById('vibe-body');
      const maskLayer = document.querySelector('.mask-layer');
      const state1Text = document.querySelector('.state-1-text');
      const state2Text = document.querySelector('.state-2-text');

      let mm = gsap.matchMedia();

      // Desktop Animation Logic (min-width: 1024px)
      mm.add("(min-width: 1024px)", () => {
        
        // Verstecke State 2 Text initial
        gsap.set(state2Text, { opacity: 0, scale: 0.9, y: 50 });

        // Erstelle eine Timeline, die an den Scroll gebunden ist
        let tl = gsap.timeline({
          scrollTrigger: {
            trigger: wrapper,
            start: "top top",
            end: "+=200%", // Die Section bleibt für 2 Viewport-Höhen "gepinnt"
            scrub: 1, // Leichtes Smoothing (1 Sekunde) für den Übergang
            pin: true,
            onUpdate: (self) => {
              // Interpoliere die Hintergrundfarbe des Bodys (außerhalb der Pinned Section) 
              // von hell (#f5f5f4) zu dunkel (#0c0a09)
              const progress = self.progress;
              const color = gsap.utils.interpolate("#f5f5f4", "#0c0a09", progress);
              body.style.backgroundColor = color;
            }
          }
        });

        // 1. Text von State 1 ausblenden
        tl.to(state1Text, {
          opacity: 0,
          y: -50,
          duration: 0.3
        }, 0);

        // 2. Die Maske (State 2) auf den vollen Viewport aufziehen
        tl.to(maskLayer, {
          clipPath: "inset(0% 0% 0% 0% round 0px)",
          ease: "power2.inOut",
          duration: 1
        }, 0.1);

        // 3. Text von State 2 einblenden
        tl.to(state2Text, {
          opacity: 1,
          scale: 1,
          y: 0,
          ease: "power3.out",
          duration: 0.5
        }, 0.6);

        return () => {
          // Cleanup
          gsap.set(maskLayer, { clearProps: "all" });
          gsap.set([state1Text, state2Text], { clearProps: "all" });
          body.style.backgroundColor = '';
        };
      });

      // Mobile Logic (max-width: 1023px)
      mm.add("(max-width: 1023px)", () => {
        // Auf Mobile verzichten wir auf das Pinning und die komplexe Maske.
        // Stattdessen triggern wir einen Farbwechsel des Bodys, sobald der zweite State ins Bild kommt.
        
        ScrollTrigger.create({
          trigger: maskLayer,
          start: "top 60%", // Wenn State 2 60% des Bildschirms erreicht
          end: "bottom top",
          onEnter: () => body.style.backgroundColor = "#0c0a09", // Dark mode
          onLeaveBack: () => body.style.backgroundColor = "#f5f5f4", // Light mode
        });
      });
    });
  </script>
</body>
</html>
