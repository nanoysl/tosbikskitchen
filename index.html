<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLOW: SYNESTHETIC DEGUSTATION</title>
  
  <script src="https://cdn.tailwindcss.com"></script>

  <style type="text/tailwindcss">
    @layer utilities {
      /* Massive Serif Typografie für den Impact */
      .text-impact {
        font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
        font-size: clamp(4rem, 15vw, 15rem);
        line-height: 0.8;
        letter-spacing: -0.05em;
      }
    }

    body {
      background-color: #000000;
      color: #ffffff;
      /* Verhindert horizontales Scrollen bei extremen Skalierungen */
      overflow-x: hidden; 
    }

    /* Der Filter-Klasse weisen wir später via CSS die SVG-Maske zu */
    .filter-smoke {
      filter: url(#smoke-dissolve);
      will-change: filter, transform, opacity;
    }

    .will-change-transform {
      will-change: transform, opacity;
    }
  </style>
</head>
<body class="antialiased">

  <svg class="hidden" xmlns="http://www.w3.org/2000/svg">
    <filter id="smoke-dissolve" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.05" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" id="displacement-map" />
      <feGaussianBlur stdDeviation="0" id="blur-map" />
    </filter>
  </svg>

  <div class="h-screen flex items-center justify-center text-stone-600 uppercase tracking-[0.3em] text-xs">
    Scroll down to taste
  </div>

  <div id="syn-flow-container" class="relative w-full h-screen bg-black overflow-hidden flex items-center justify-center cursor-default">
    
    <div id="syn-dot" class="absolute w-2 h-2 md:w-3 md:h-3 bg-white rounded-full z-50 will-change-transform shadow-[0_0_15px_rgba(255,255,255,0.8)]"></div>

    <div id="syn-media" class="absolute inset-0 w-full h-full z-10 opacity-0 scale-50 will-change-transform">
      <img src="https://images.unsplash.com/photo-1541701494587-cb58502866ab?q=80&w=2000&auto=format&fit=crop" 
           alt="Abstract Impact" 
           class="w-full h-full object-cover">
      <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_0%,#000_100%)]"></div>
    </div>

    <div id="syn-impact-text" class="absolute z-20 flex flex-col items-center justify-center opacity-0 scale-150 filter-smoke pointer-events-none">
      <h2 class="text-impact font-bold text-[#ff3333] mix-blend-screen text-center">UMAMI<br>& FIRE.</h2>
    </div>

    <div id="syn-resonance" class="absolute z-30 flex flex-col items-center justify-center text-center px-6 opacity-0 translate-y-10">
      <span class="text-[10px] md:text-xs tracking-[0.4em] uppercase text-stone-400 mb-6 block">Course IV</span>
      <h3 class="text-2xl md:text-4xl font-light text-stone-100 mb-4 tracking-wide">Aged Wagyu Tartare</h3>
      <p class="text-sm md:text-base text-stone-400 max-w-md font-light leading-relaxed">
        Geräuchert über 12 Jahre altem Kirschholz. Ein aggressiver, primaler Aufschlag am Gaumen, der weich in absolute Tiefe zerfällt.
      </p>
    </div>

  </div>
  <div class="h-[150vh] flex items-center justify-center text-stone-600 uppercase tracking-[0.3em] text-xs border-t border-stone-900 bg-stone-950">
    End of Experience
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      gsap.registerPlugin(ScrollTrigger);

      const container = document.getElementById('syn-flow-container');
      const dot = document.getElementById('syn-dot');
      const media = document.getElementById('syn-media');
      const impactText = document.getElementById('syn-impact-text');
      const resonance = document.getElementById('syn-resonance');
      
      // Greife auf die SVG Filter Elemente im DOM zu
      const displacementMap = document.querySelector('#displacement-map');
      const blurMap = document.querySelector('#blur-map');

      // Master Timeline, gebunden an den Scroll
      // +=400% bedeutet, der User muss 4 Viewport-Höhen scrollen, um die ganze Sequenz zu erleben
      const tl = gsap.timeline({
        scrollTrigger: {
          trigger: container,
          start: "top top",
          end: "+=400%",
          scrub: 0.5, // Leichtes Smoothing für extrem edles Feel
          pin: true,
        }
      });

      /* =========================================================
         CHOREOGRAFIE DER ANIMATIONEN (Prozentuale Verteilung)
         ========================================================= */

      // 1. Der Punkt pulsiert leicht (Vorbereitung)
      tl.to(dot, { scale: 1.5, duration: 0.5, ease: "power1.inOut" })
        // 2. Der Punkt zieht sich zusammen auf 0
        .to(dot, { scale: 0, opacity: 0, duration: 0.3, ease: "power4.in" })
        
        // 3. EXPLOSION: Media ballert rein (Gleichzeitig mit dem Verschwinden des Punkts)
        .to(media, { opacity: 1, scale: 1, duration: 1, ease: "expo.out" }, "-=0.1")
        
        // 4. IMPACT TEXT knallt rein (Scale down von 1.5 auf 1)
        .to(impactText, { opacity: 1, scale: 1, duration: 0.8, ease: "back.out(1.5)" }, "-=0.8")
        
        // 5. HOLD STATE (Wir lassen den User den Impact kurz genießen)
        .to({}, { duration: 1 }) 
        
        // 6. RESONANCE (Die Auflösung)
        // Media wird abgedunkelt
        .to(media, { opacity: 0.3, scale: 1.05, duration: 2, ease: "power2.inOut" }, "dissolve")
        
        // SVG FILTER MAGIC: Wir animieren die Attribute des SVG Filters, um den Text zu "schmelzen"
        .to(displacementMap, {
          attr: { scale: 150 }, // Die Stärke der Verzerrung
          duration: 2, 
          ease: "power2.in"
        }, "dissolve")
        .to(blurMap, {
          attr: { stdDeviation: 10 }, // Leichter Blur für den Rauch-Effekt
          duration: 2, 
          ease: "power2.in"
        }, "dissolve")
        .to(impactText, { opacity: 0, duration: 1.5, ease: "power2.in" }, "dissolve+=0.5")

        // 7. FINALER TEXT (Die sanfte Erklärung) taucht auf
        .to(resonance, { opacity: 1, y: 0, duration: 1.5, ease: "power3.out" }, "dissolve+=1");

    });
  </script>
</body>
</html>
